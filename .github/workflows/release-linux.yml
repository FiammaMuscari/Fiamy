name: Release Linux Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to replace Linux assets on'
        required: true
        default: 'v1.0.2-linux-beta'

permissions:
  contents: write

jobs:
  linux-assets:
    # Build Linux release assets on an older stable distro so bundled runtime
    # libraries do not pick up GLIBC symbols from rolling/new Ubuntu hosts.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            patchelf \
            wget \
            yt-dlp \
            libgl-dev \
            libopengl-dev \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-declarative-dev-tools \
            qt6-multimedia-dev \
            qt6-wayland

      - name: Build portable Linux bundle
        run: ./packaging/linux/package-portable.sh

      - name: Build AppImage
        run: FIAMY_SKIP_PORTABLE_BUILD=1 ./packaging/linux/package-appimage.sh

      - name: Build Ubuntu-targeted .deb
        run: FIAMY_SKIP_PORTABLE_BUILD=1 ./packaging/linux/package-deb.sh ubuntu-debian-bundled

      - name: Generate Linux checksums
        run: |
          sha256sum \
            dist/linux-appimage/Fiamy-*-x86_64.AppImage \
            dist/linux-portable/fiamy-*-linux-portable-x86_64.tar.gz \
            dist/linux-deb/fiamy_*_ubuntu-debian-bundled_amd64.deb \
            > dist/linux-sha256sums.txt

      - name: Smoke test portable bundle
        run: ./packaging/linux/smoke-test-linux-bundle.sh dist/fiamy-linux-portable

      - name: Smoke test AppImage
        run: ./packaging/linux/smoke-test-linux-bundle.sh dist/linux-appimage/Fiamy-*-x86_64.AppImage

      - name: Audit AppImage portability
        run: ./packaging/linux/audit-appimage.sh dist/linux-appimage/Fiamy-*-x86_64.AppImage 2.35

      - name: Upload AppImage to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fiamy-linux-appimage
          path: dist/linux-appimage/*.AppImage

      - name: Upload portable tarball to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fiamy-linux-portable
          path: dist/linux-portable/*.tar.gz

      - name: Upload deb to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fiamy-linux-deb
          path: dist/linux-deb/*.deb

      - name: Upload Linux checksums to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fiamy-linux-sha256sums
          path: dist/linux-sha256sums.txt

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_tag }}
          overwrite_files: true
          files: |
            dist/linux-appimage/*.AppImage
            dist/linux-portable/*.tar.gz
            dist/linux-deb/*.deb
            dist/linux-sha256sums.txt
